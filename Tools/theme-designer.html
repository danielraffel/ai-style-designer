    });

    // Clear context button
    document.getElementById('chat-clear-context')?.addEventListener('click', () => {
      this.updateContext(null);
    });

    // Model selection — persist in localStorage
    const modelSelect = document.getElementById('chat-model');
    const savedModel = localStorage.getItem('ai-style-model');
    if (savedModel && modelSelect) modelSelect.value = savedModel;
    modelSelect?.addEventListener('change', (e) => {
      localStorage.setItem('ai-style-model', e.target.value);
    });

    // Send button
    document.getElementById('chat-send-btn').addEventListener('click', () => this.send());

    // Enter to send (Shift+Enter for newline)
    document.getElementById('chat-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        this.send();
      }
    });

    // Image upload
    document.getElementById('chat-upload-btn').addEventListener('click', () => {
      document.getElementById('chat-file-input').click();
    });
    document.getElementById('chat-file-input').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        this.pendingImage = ev.target.result; // base64 data URL
        // Show thumbnail in input area (don't post to chat)
        this.showPendingImageThumb(file.name);
      };
      reader.readAsDataURL(file);
      e.target.value = ''; // allow re-upload
    });

    // Export button in chat
    document.getElementById('chat-export-btn').addEventListener('click', () => {
      ExportPanel.show();
    });
  },

  showPendingImageThumb(filename) {
    let container = document.getElementById('chat-image-preview');
    if (!container) {
      container = document.createElement('div');
      container.id = 'chat-image-preview';
      container.style.cssText = 'display:flex;align-items:center;gap:4px;padding:4px 8px;background:var(--app-panel);border-radius:4px;margin-bottom:4px;';
      const inputArea = document.getElementById('chat-input-area');
      inputArea.parentNode.insertBefore(container, inputArea);
    }
    container.innerHTML = `
      <img src="${this.pendingImage}" style="width:36px;height:36px;object-fit:cover;border-radius:3px;border:1px solid var(--app-border)">
      <span style="font-size:9px;color:var(--app-text-muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${filename}</span>
      <button style="background:none;border:none;color:var(--app-text-dim);cursor:pointer;font-size:12px;padding:2px" id="chat-clear-image">✕</button>
    `;
    document.getElementById('chat-clear-image').addEventListener('click', () => this.clearPendingImage());
  },

  clearPendingImage() {
    this.pendingImage = null;
    const container = document.getElementById('chat-image-preview');
    if (container) container.remove();
  },

  send() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;

    // Include image indicator in user message if attached
    const userText = this.pendingImage ? `${text} [image attached]` : text;
    this.addMessage('user', userText);
    input.value = '';

    // Show typing indicator
    this.showTyping(true);

    // Call agent via Tauri IPC or fallback to mock
    this.callAgent(text, this.pendingImage).then(response => {
      this.showTyping(false);
      if (response.diff && Object.keys(response.diff).length > 0) {
        // Debug: log the actual diff
        console.log('Style diff received:', JSON.stringify(response.diff, null, 2));
        // Apply the style diff
        this.applyStyleDiff(response.diff);
        // Build change summary (muted detail)
        const changes = this.summarizeChanges(response.diff);
        // Clean up message — remove code fences and artifacts
        let explanation = (response.message || '').replace(/```json/g, '').replace(/```/g, '').trim();
        // If no explanation, use a default
        if (!explanation || explanation === 'Style updated') {
          explanation = changes;
        }
        // Capture thumbnail after applying changes
        setTimeout(() => {
          const thumbnail = this.capturePreviewThumbnail();
          this.addMessage('agent', explanation, null, response.diff, thumbnail, changes);
        }, 100); // small delay for canvas redraws
      } else {
        this.addMessage('agent', response.message || 'No changes applied');
      }
    }).catch(err => {
      this.showTyping(false);
      this.addMessage('agent', 'Error: ' + (err.message || err));
    });

    this.clearPendingImage();
  },

  // addMessage defined below with diff/thumbnail support

  renderMessages() {
    const container = document.getElementById('chat-messages');
    container.innerHTML = this.messages.map(m => {
      let html = `<div class="chat-msg ${m.role}">${this.escapeHtml(m.text)}`;
      if (m.changeSummary && m.changeSummary !== m.text) {
        html += `<div class="chat-change-summary">${this.escapeHtml(m.changeSummary)}</div>`;
      }
      if (m.imageDataUrl) {
        html += `<br><img class="chat-img-preview" src="${m.imageDataUrl}" alt="uploaded">`;
      }
      if (m.thumbnail) {
        html += `<div class="chat-snapshot-wrap">`;
        html += `<img class="chat-thumb" src="${m.thumbnail}" alt="preview" data-timestamp="${m.timestamp}">`;
        if (m.styleSnapshot) {
          html += `<button class="chat-restore-btn" data-timestamp="${m.timestamp}">Restore this style</button>`;
        }
        html += `</div>`;
      }
      html += '</div>';
      return html;
    }).join('');

    // Scroll to bottom
    container.scrollTop = container.scrollHeight;

    // Bind restore buttons and thumbnail clicks
    container.querySelectorAll('.chat-restore-btn, .chat-thumb').forEach(el => {
      el.addEventListener('click', () => {
        const ts = parseInt(el.dataset.timestamp);
        const msg = this.messages.find(m => m.timestamp === ts);
        if (msg?.styleSnapshot) {
          this.restoreFullSnapshot(msg.styleSnapshot);
          Toast.show('Restored style snapshot');
        }
      });
    });
  },

  showTyping(show) {
    const container = document.getElementById('chat-messages');
    const existing = container.querySelector('.chat-typing');
    if (existing) existing.remove();
    if (show) {
      const typing = document.createElement('div');
      typing.className = 'chat-typing';
      typing.innerHTML = '<div class="chat-typing-dot"></div><div class="chat-typing-dot"></div><div class="chat-typing-dot"></div>';
      container.appendChild(typing);
      container.scrollTop = container.scrollHeight;
    }
  },

  updateContext(componentName) {
    this.selectedComponent = componentName;
    const badge = document.getElementById('chat-context');
    const clearBtn = document.getElementById('chat-clear-context');
    if (badge) {
      badge.textContent = componentName ? `Editing: ${componentName}` : 'Editing: All Components';
    }
    if (clearBtn) {
      clearBtn.style.display = componentName ? 'inline' : 'none';
    }
  },

  buildFullContext() {
    // Combine color tokens AND style system into one JSON for Claude
    const context = {};
    // Add current color tokens (simplified: just token name → hex value)
    if (TokenRegistry.theme) {
      const colorSummary = {};
      for (const section of ['colors', 'custom']) {
        const tokens = TokenRegistry.theme[section];
        if (tokens) {
          colorSummary[section] = {};
          for (const [name, data] of Object.entries(tokens)) {
            colorSummary[section][name] = data.value;
          }
        }
      }
      context.currentColors = colorSummary;
    }
    // Add style system
    if (StyleSystem.current) {
      context.styleSystem = StyleSystem.current;
    }
    return JSON.stringify(context);
  },

  async callAgent(prompt, imageBase64) {
    const model = document.getElementById('chat-model')?.value || 'claude-sonnet-4-6';
    // If image attached, add note to prompt (v1: text-only, image data not sent to Claude CLI)
    const fullPrompt = imageBase64
      ? `${prompt}\n\n[Note: User attached a reference image. Use the text description to interpret what style they want.]`
      : prompt;

    // Try Tauri IPC first
    if (window.__TAURI__) {
      try {
        const result = await window.__TAURI__.core.invoke('chat_send', {
          prompt: fullPrompt,
          styleJson: this.buildFullContext(),
          selectedComponent: this.selectedComponent || null,
          model,
        });
        return JSON.parse(result);
      } catch (e) {
        return { message: 'Claude error: ' + e, diff: {} };
      }
    }

    // Browser fallback: simulate an agent response for testing
    return new Promise(resolve => {
      setTimeout(() => {
        // Mock: generate a plausible diff based on keywords in the prompt
        const diff = this.mockStyleDiff(prompt);
        resolve({
          message: Object.keys(diff).length > 0
            ? `Applied ${Object.keys(diff).length} style changes (mock mode — connect Tauri agent for real AI)`
            : 'No style changes detected (mock mode)',
          diff
        });
      }, 800);
    });
  },

  // Mock agent for browser testing — produces DRAMATIC changes including colors
  mockStyleDiff(prompt) {
    const p = prompt.toLowerCase();
    const diff = {};
    if (p.includes('round') || p.includes('soft') || p.includes('warm') || p.includes('analog')) {
      diff.geometry = { global: { cornerRadius: 16 }, button: { cornerRadius: 16 }, toggle: { trackRounding: 12 } };
      diff.effects = { shadows: { enabled: true, blur: 8, offsetY: 3, alpha: 0.3 } };
      diff.widgetStyles = { knobStyle: 'filled', buttonStyle: 'raised', toggleStyle: 'pill' };
      diff.colors = {
        custom: { PluginBackground: '#2D1F1A', PanelBackground: '#3A2820', PanelBorder: '#5A4030', KnobArc: '#E8A44D', KnobArcBackground: '#4A3828', AccentPrimary: '#E8A44D', AccentSecondary: '#C47B3A', SliderFill: '#E8A44D', WaveformLine: '#E8A44D', TabActive: '#E8A44D', ProgressFill: '#E8A44D' },
        colors: { UiButtonBackground: '#4A3828', UiButtonText: '#E8D0B0', UiActionButtonBackground: '#E8A44D', UiActionButtonText: '#1A1008', ToggleButtonOn: '#E8A44D', TextEditorBackground: '#2A1C14', TextEditorBorder: '#5A4030', TextEditorText: '#E8D0B0' }
      };
    }
    if (p.includes('sharp') || p.includes('flat') || p.includes('pixel') || p.includes('retro') || p.includes('80s') || p.includes('mac')) {
      diff.geometry = { global: { cornerRadius: 0, borderWidth: 2 }, button: { cornerRadius: 0 }, toggle: { trackRounding: 2 }, slider: { trackRounding: 0 } };
      diff.effects = { bloom: { enabled: false }, shadows: { enabled: false } };
      diff.widgetStyles = { knobStyle: 'notched', buttonStyle: 'beveled', toggleStyle: 'checkbox' };
      diff.colors = {
        custom: { PluginBackground: '#C0C0C0', PanelBackground: '#FFFFFF', PanelBorder: '#000000', KnobArc: '#000000', KnobArcBackground: '#999999', KnobThumb: '#000000', SliderTrack: '#999999', SliderFill: '#000000', AccentPrimary: '#000000', TextPrimary: '#000000', TextSecondary: '#333333', CardEmpty: '#DDDDDD', CardReady: '#FFFFFF', TabActive: '#000000', WaveformLine: '#000000', ProgressFill: '#000000' },
        colors: { UiButtonBackground: '#FFFFFF', UiButtonText: '#000000', UiActionButtonBackground: '#000000', UiActionButtonText: '#FFFFFF', ToggleButtonOn: '#000000', ToggleButtonOff: '#999999', TextEditorBackground: '#FFFFFF', TextEditorBorder: '#000000', TextEditorText: '#000000', PopupMenuBackground: '#FFFFFF', PopupMenuBorder: '#000000', PopupMenuText: '#000000' }
      };
      diff.typography = { fontWeight: 700 };
    }
    if (p.includes('glow') || p.includes('neon') || p.includes('cyber')) {
      diff.geometry = { global: { cornerRadius: 0, borderWidth: 1 } };
      diff.effects = { bloom: { enabled: true, size: 20, intensity: 3 }, shadows: { enabled: true, blur: 20, alpha: 0.8 } };
      diff.widgetStyles = { knobStyle: 'filled', buttonStyle: 'outlined', toggleStyle: 'rocker' };
      diff.colors = {
        custom: { PluginBackground: '#0A0A0F', PanelBackground: '#111118', PanelBorder: '#FF00FF', KnobArc: '#00FFFF', KnobArcBackground: '#1A1A2E', KnobThumb: '#FF00FF', SliderFill: '#00FFFF', AccentPrimary: '#FF00FF', AccentSecondary: '#00FFFF', TextPrimary: '#00FFFF', TextSecondary: '#FF00FF', WaveformLine: '#00FFFF', ProgressFill: '#FF00FF', TabActive: '#FF00FF' },
        colors: { UiButtonBackground: '#1A1A2E', UiButtonText: '#00FFFF', UiActionButtonBackground: '#FF00FF', UiActionButtonText: '#000000', ToggleButtonOn: '#00FFFF', TextEditorBackground: '#0A0A0F', TextEditorBorder: '#FF00FF', TextEditorText: '#00FFFF' }
      };
    }
    if (p.includes('skeuomorphic') || p.includes('3d') || p.includes('depth')) {
      diff.effects = { shadows: { enabled: true, blur: 12, offsetY: 6, alpha: 0.5 } };
      diff.geometry = { global: { borderWidth: 2, cornerRadius: 8 } };
    }
    if (p.includes('big') || p.includes('large')) {
      diff.typography = { headingSize: 20, bodySize: 16, labelSize: 13 };
    }
    if (p.includes('small') || p.includes('compact')) {
      diff.typography = { headingSize: 13, bodySize: 11, labelSize: 9 };
    }
    return diff;
  },

  summarizeChanges(diff) {
    const changes = [];
    const flatten = (obj, prefix = '') => {
      for (const [k, v] of Object.entries(obj)) {
        const path = prefix ? `${prefix}.${k}` : k;
        if (v && typeof v === 'object' && !Array.isArray(v)) flatten(v, path);
        else changes.push(`${path}: ${v}`);
      }
    };
    flatten(diff);
    const count = changes.length;
    if (count === 0) return 'No properties changed';
    const preview = changes.slice(0, 4).join(', ');
    const more = count > 4 ? ` +${count - 4} more` : '';
    return `Updated ${count} properties: ${preview}${more}`;
  },

  applyStyleDiff(diff) {
    if (!StyleSystem.current) {
      StyleSystem.current = {};
    }
    // Deep merge diff into current style
    const merge = (target, source) => {
      for (const key of Object.keys(source)) {
        if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
          if (!target[key]) target[key] = {};
          merge(target[key], source[key]);
        } else {
          target[key] = source[key];
        }
      }
    };
    merge(StyleSystem.current, diff);

    // Apply ALL style changes: CSS vars + canvas redraws + color system
    StyleSystem.applyToCSS();
    CanvasRenderer.scheduleRedraw();

    // If diff contains color-related changes, also update color system
    if (diff.colors || diff.colorSystem) {
      const colorDiff = diff.colors || diff.colorSystem;
      if (colorDiff && typeof colorDiff === 'object') {
        for (const [section, tokens] of Object.entries(colorDiff)) {
          if (typeof tokens === 'object') {
            for (const [name, value] of Object.entries(tokens)) {
              if (typeof value === 'string' && value.startsWith('#')) {
                TokenRegistry.setColor(section, name, value, 1, true);
              }
            }
          }
        }
        CSSBridge.syncAll();
      }
    }

    // Force re-render preview
    PreviewRenderer.drawWaveform();
    PreviewRenderer.drawMeters();

    // Flash only the relevant component area (not entire preview)
    const selectedComponent = ChatUI.selectedComponent;
    const selector = selectedComponent
      ? `[data-component="${selectedComponent}"]`
      : '.preview-section';
    document.querySelectorAll(selector).forEach(el => {
      el.classList.remove('token-changed-flash');
      void el.offsetWidth;
      el.classList.add('token-changed-flash');
    });
  },

  capturePreviewThumbnail() {
    // Capture a color palette swatch showing the current theme's key colors
    try {
      const style = getComputedStyle(document.getElementById('preview-area'));
      const get = (v, fb) => style.getPropertyValue(v)?.trim() || fb;
      const canvas = document.createElement('canvas');
      canvas.width = 200; canvas.height = 80;
      const ctx = canvas.getContext('2d');
      const bg = get('--vt-PluginBackground', '#33393F');
      const panel = get('--vt-PanelBackground', '#2C3033');
      const accent = get('--vt-AccentPrimary', '#AA88FF');
      const btnBg = get('--vt-UiButtonBackground', '#4C4F52');
      const btnText = get('--vt-UiButtonText', '#DDDDDD');
      const knobArc = get('--vt-KnobArc', '#AA88FF');
      const textPrimary = get('--vt-TextPrimary', '#EEEEEE');
      const toggleOn = get('--vt-ToggleButtonOn', '#AA88FF');
      // Background
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, 200, 80);
      // Panel strip
      ctx.fillStyle = panel;
      ctx.fillRect(0, 0, 200, 24);
      // Accent bar
      ctx.fillStyle = accent;
      ctx.fillRect(0, 22, 200, 3);
      // Mini button
      const r = parseFloat(style.getPropertyValue('--st-button-rounding')) || 6;
      ctx.fillStyle = btnBg;
      roundRect(ctx, 8, 32, 50, 18, Math.min(r, 9));
      ctx.fill();
      ctx.fillStyle = btnText;
      ctx.font = '9px sans-serif';
      ctx.fillText('Btn', 20, 44);
      // Action button
      ctx.fillStyle = accent;
      roundRect(ctx, 64, 32, 50, 18, Math.min(r, 9));
      ctx.fill();
      // Knob
      ctx.beginPath();
      ctx.arc(148, 42, 12, 0, Math.PI * 2);
      ctx.fillStyle = panel;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(148, 42, 10, Math.PI * 0.75, Math.PI * 2.1);
      ctx.strokeStyle = knobArc;
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.stroke();
      // Toggle
      ctx.fillStyle = toggleOn;
      roundRect(ctx, 172, 35, 22, 12, 6);
      ctx.fill();
      // Text sample
      ctx.fillStyle = textPrimary;
      ctx.font = '8px sans-serif';
      ctx.fillText('Text', 8, 68);
      ctx.fillStyle = get('--vt-TextSecondary', '#848789');
      ctx.fillText('Secondary', 36, 68);
      // Color swatches row at bottom
      const swatches = [bg, panel, accent, knobArc, toggleOn, btnBg];
      swatches.forEach((c, i) => {
        ctx.fillStyle = c;
        ctx.fillRect(8 + i * 30, 72, 26, 6);
      });
      return canvas.toDataURL('image/png', 0.7);
    } catch (e) {
      return null;
    }
    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }
  },

  captureFullSnapshot() {
    // Capture BOTH color tokens AND style system so restore is complete
    return {
      styleSystem: JSON.parse(JSON.stringify(StyleSystem.current)),
      colorTokens: TokenRegistry.theme ? JSON.parse(JSON.stringify({
        colors: TokenRegistry.theme.colors,
        custom: TokenRegistry.theme.custom,
        values: TokenRegistry.theme.values,
        juce: TokenRegistry.theme.juce,
      })) : null,
    };
  },

  restoreFullSnapshot(snapshot) {
    if (!snapshot) return;
    // Restore style system
    if (snapshot.styleSystem) {
      StyleSystem.load(snapshot.styleSystem);
    }
    // Restore color tokens
    if (snapshot.colorTokens) {
      for (const section of ['colors', 'custom', 'juce']) {
        const tokens = snapshot.colorTokens[section];
        if (tokens) {
          for (const [name, data] of Object.entries(tokens)) {
            if (typeof data.value === 'string' && data.value.startsWith('#')) {
              TokenRegistry.setColor(section, name, data.value, data.alpha ?? 1, true);
            }
          }
        }
      }
      // Restore values
      if (snapshot.colorTokens.values) {
        for (const [name, data] of Object.entries(snapshot.colorTokens.values)) {
          TokenRegistry.setValue(name, data.value);
        }
      }
      CSSBridge.syncAll();
    }
    CanvasRenderer.scheduleRedraw();
    PreviewRenderer.drawWaveform();
    PreviewRenderer.drawMeters();
  },

  addMessage(role, text, imageDataUrl, diff, thumbnail, changeSummary) {
    const msg = { role, text, imageDataUrl, diff, thumbnail, changeSummary, timestamp: Date.now() };
    if (diff && Object.keys(diff).length > 0) {
      msg.styleSnapshot = this.captureFullSnapshot();
    }
    this.messages.push(msg);
    this.renderMessages();
  },

  escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
};

// ── App Controller ───────────────────────
const App = {
  init() {
    // Load embedded theme
    const themeData = JSON.parse(document.getElementById('theme-data').textContent);
    TokenRegistry.load(themeData);

    // Load style system (geometry, effects, gradients, typography)
    const styleData = document.getElementById('style-system-data');
    if (styleData) {
      StyleSystem.load(JSON.parse(styleData.textContent));
    }

    // Render
    LeftPanel.render();
    PreviewRenderer.render();
    SelectAndTweak.init();
    StateController.init();
    ColorSystemUI.init();
    ChatUI.init();

    // Search
    document.getElementById('token-search').addEventListener('input', (e) => {
      LeftPanel.filterBySearch(e.target.value);
    });

    // Theme name
    document.getElementById('theme-name').addEventListener('change', (e) => {
      TokenRegistry.theme.meta.name = e.target.value;
    });

    // Preset dropdown
    document.getElementById('preset-select').addEventListener('change', (e) => {
      PresetLibrary.apply(e.target.value);
    });

    // Export
    document.getElementById('btn-export').addEventListener('click', () => ExportPanel.show());
    document.getElementById('export-close').addEventListener('click', () => ExportPanel.hide());
    document.getElementById('export-overlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) ExportPanel.hide();
    });
    document.querySelectorAll('.export-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.export-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        ExportPanel.currentTab = tab.dataset.tab;
        ExportPanel.generate();
      });
    });
    document.getElementById('export-copy').addEventListener('click', () => {
      const code = document.getElementById('export-code').textContent;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(code).then(() => Toast.show('Copied to clipboard')).catch(() => {
          // Fallback for file:// protocol
          const ta = document.createElement('textarea');
          ta.value = code; ta.style.position = 'fixed'; ta.style.opacity = '0';
          document.body.appendChild(ta); ta.select(); document.execCommand('copy');
          document.body.removeChild(ta);
          Toast.show('Copied to clipboard');
        });
      } else {
        const ta = document.createElement('textarea');
        ta.value = code; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        Toast.show('Copied to clipboard');
      }
    });
    document.getElementById('export-download').addEventListener('click', () => {
      const code = document.getElementById('export-code').textContent;
      const tab = ExportPanel.currentTab;
      const name = (TokenRegistry.theme.meta?.name || 'theme').toLowerCase().replace(/[^a-z0-9]+/g, '-');
      const ext = { json: '.json', css: '.css', cpp: '.h', palette: '.h', oklch: '.css', colorsystem: '.colorsystem.json', stylesystem: '.stylesystem.json' }[tab] || '.txt';
      const mime = { json: 'application/json', css: 'text/css', cpp: 'text/plain', palette: 'text/plain', oklch: 'text/css', colorsystem: 'application/json', stylesystem: 'application/json' }[tab] || 'text/plain';
      const filename = tab === 'palette' ? `${name}-palette${ext}` : tab === 'colorsystem' ? `${name}${ext}` : `${name}${ext}`;
      const blob = new Blob([code], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
      Toast.show('Downloaded ' + filename);
    });

    // Import
    document.getElementById('btn-import').addEventListener('click', () => ImportExport.importJSON());
    document.getElementById('import-input').addEventListener('change', (e) => {
      if (e.target.files[0]) ImportExport.handleFile(e.target.files[0]);
    });

    // Undo / Redo buttons
    document.getElementById('btn-undo').addEventListener('click', () => {
      UndoManager.undo();
      LeftPanel.render();
      PreviewRenderer.render();
    });
    document.getElementById('btn-redo').addEventListener('click', () => {
      UndoManager.redo();
      LeftPanel.render();
      PreviewRenderer.render();
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        ExportPanel.hide();
        document.getElementById('info-overlay').style.display = 'none';
      }
      if ((e.metaKey || e.ctrlKey) && e.key === 'e') {
        e.preventDefault();
        ExportPanel.show();
      }
      if ((e.metaKey || e.ctrlKey) && e.key === 'z' && !e.shiftKey) {
        e.preventDefault();
        UndoManager.undo();
        LeftPanel.render();
        PreviewRenderer.render();
      }
      if ((e.metaKey || e.ctrlKey) && e.key === 'z' && e.shiftKey) {
        e.preventDefault();
        UndoManager.redo();
        LeftPanel.render();
        PreviewRenderer.render();
      }
    });
  }
};

// Boot
document.addEventListener('DOMContentLoaded', App.init);
</script>
</body>
</html>
