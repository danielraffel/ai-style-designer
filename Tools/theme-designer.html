const LeftPanel = {
  groupOrder: {
    colors: {
      'UiButton': ['UiButtonBackground', 'UiButtonBackgroundHover', 'UiButtonText', 'UiButtonTextHover', 'UiActionButtonBackground', 'UiActionButtonBackgroundHover', 'UiActionButtonText', 'UiActionButtonTextHover'],
      'TextButton': ['TextButtonBackgroundOff', 'TextButtonBackgroundOffHover', 'TextButtonBackgroundOn', 'TextButtonBackgroundOnHover', 'TextButtonTextOff', 'TextButtonTextOffHover', 'TextButtonTextOn', 'TextButtonTextOnHover'],
      'Toggle': ['ToggleButtonDisabled', 'ToggleButtonOff', 'ToggleButtonOffHover', 'ToggleButtonOn', 'ToggleButtonOnHover'],
      'TextEditor': ['TextEditorBackground', 'TextEditorBorder', 'TextEditorText', 'TextEditorDefaultText', 'TextEditorCaret', 'TextEditorSelection'],
      'PopupMenu': ['PopupMenuBackground', 'PopupMenuBorder', 'PopupMenuText', 'PopupMenuDisabledText', 'PopupMenuSelection', 'PopupMenuSelectionText'],
      'ScrollBar': ['ScrollBarDefault', 'ScrollBarDown'],
      'Other': ['ButtonShadow']
    }
  },

  render() {
    const container = document.getElementById('token-groups');
    let html = '';

    // Visage colors
    html += '<div class="token-section-header">Visage Tokens</div>';
    for (const [groupName, tokenNames] of Object.entries(this.groupOrder.colors)) {
      html += this.renderGroup(groupName, 'colors', tokenNames);
    }

    // Values
    html += '<div class="token-section-header">Values</div>';
    html += this.renderValueGroup('All Values', Object.keys(TokenRegistry.theme.values || {}));

    // Custom
    html += '<div class="token-section-header">Custom Tokens</div>';
    const customGroups = this.groupCustomTokens(TokenRegistry.theme.custom || {});
    for (const [groupName, tokenNames] of Object.entries(customGroups)) {
      html += this.renderGroup(groupName, 'custom', tokenNames);
    }

    // JUCE
    html += '<div class="token-section-header">JUCE Tokens</div>';
    const juceGroups = this.groupJuceTokens(TokenRegistry.theme.juce || {});
    for (const [groupName, tokenNames] of Object.entries(juceGroups)) {
      html += this.renderGroup(groupName, 'juce', tokenNames);
    }

    container.innerHTML = html;
    this.bindEvents();
    // Reapply search filter if active
    const q = document.getElementById('token-search')?.value;
    if (q) this.filterBySearch(q);
  },

  groupCustomTokens(tokens) {
    const groups = {};
    for (const name of Object.keys(tokens)) {
      const match = name.match(/^([A-Z][a-z]+)/);
      const group = match ? match[1] : 'Other';
      (groups[group] = groups[group] || []).push(name);
    }
    return groups;
  },

  groupJuceTokens(tokens) {
    const groups = {};
    for (const name of Object.keys(tokens)) {
      const cls = name.split('::')[0];
      (groups[cls] = groups[cls] || []).push(name);
    }
    return groups;
  },

  renderGroup(groupName, section, tokenNames) {
    const tokens = tokenNames.filter(n => TokenRegistry.theme[section]?.[n]);
    if (!tokens.length) return '';
    let rows = tokens.map(name => {
      const token = TokenRegistry.theme[section][name];
      const rgba = ColorConverter.hexAlphaToRgba(token.value, token.alpha ?? 1);
      const displayName = section === 'juce' ? name.split('::')[1] || name : name;
      return `<div class="token-row" data-section="${section}" data-token="${name}">
        <div class="token-swatch" style="background:${rgba}" title="${name}"></div>
        <span class="token-name" title="${name}">${displayName}</span>
        <input type="text" class="token-hex" value="${token.value}" data-section="${section}" data-token="${name}">
        <input type="color" class="hidden-picker" value="${token.value}" data-section="${section}" data-token="${name}">
      </div>`;
    }).join('');

    return `<div class="token-group">
      <div class="token-group-header" data-group="${groupName}">
        <span class="arrow">▶</span>
        <span class="group-name">${groupName}</span>
        <span class="group-count">${tokens.length}</span>
      </div>
      <div class="token-group-body">${rows}</div>
    </div>`;
  },

  renderValueGroup(groupName, tokenNames) {
    const tokens = tokenNames.filter(n => TokenRegistry.theme.values?.[n]);
    if (!tokens.length) return '';
    let rows = tokens.map(name => {
      const token = TokenRegistry.theme.values[name];
      return `<div class="token-row-value" data-token="${name}">
        <span class="token-name" title="${name}">${name}</span>
        <input type="range" class="token-value-slider" min="${token.min ?? 0}" max="${token.max ?? 100}" step="0.1" value="${token.value}" data-token="${name}">
        <input type="text" class="token-value-input" value="${token.value}" data-token="${name}">
      </div>`;
    }).join('');

    return `<div class="token-group">
      <div class="token-group-header" data-group="${groupName}">
        <span class="arrow">▶</span>
        <span class="group-name">${groupName}</span>
        <span class="group-count">${tokens.length}</span>
      </div>
      <div class="token-group-body">${rows}</div>
    </div>`;
  },

  bindEvents() {
    // Group headers toggle
    document.querySelectorAll('.token-group-header').forEach(header => {
      header.addEventListener('click', () => {
        header.classList.toggle('expanded');
        header.closest('.token-group').classList.toggle('expanded');
      });
    });

    // Color swatch click → open inline palette picker
    document.querySelectorAll('.token-swatch').forEach(swatch => {
      swatch.addEventListener('click', (e) => {
        e.stopPropagation();
        // Close any existing dropdown
        document.querySelectorAll('.palette-picker-dropdown').forEach(d => d.remove());

        const row = swatch.closest('.token-row');
        const section = row.dataset.section;
        const tokenName = row.dataset.token;
        row.style.position = 'relative';

        // Track history
        const th = TokenHistory.getOrCreate(section, tokenName);
        const originalHex = th.original;
        const originalAlpha = TokenRegistry.theme[section]?.[tokenName]?.alpha ?? 1;

        // Build dropdown — position fixed on body to avoid clipping
        const dd = document.createElement('div');
        dd.className = 'palette-picker-dropdown';
        let html = `<div class="pp-undo-bar">
          <button class="pp-undo-btn pp-do-undo" title="Undo to ${originalHex}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 10h10a5 5 0 015 5v0a5 5 0 01-5 5H8"/><path d="M7 6L3 10l4 4"/></svg>
            undo
          </button>
          <button class="pp-undo-btn pp-do-redo" title="Redo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10H11a5 5 0 00-5 5v0a5 5 0 005 5h5"/><path d="M17 6l4 4-4 4"/></svg>
            redo
          </button>
          <button class="pp-reset-btn pp-do-reset" title="Reset to original">reset</button>
        </div>`;

        const cs = ColorSystemModel.current;
        if (cs?.palettes) {
          for (const [palName, palette] of Object.entries(cs.palettes)) {
            html += `<div class="pp-section-label">${palName}</div><div class="pp-shade-row">`;
            for (const step of ShadeGenerator.SHADE_STEPS) {
              const shade = palette.shades[step];
              if (shade) {
                html += `<div class="pp-swatch" style="background:${shade.hex}" title="${palName}-${step}: ${shade.hex}" data-hex="${shade.hex}"></div>`;
              }
            }
            html += '</div>';
          }
        }

        // Eyedropper (Chrome/Edge only)
        if (window.EyeDropper) {
          html += `<div class="pp-eyedropper" title="Pick a color from anywhere on screen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 22l1-1h3l9-9 2 2-1 1 3 3 4-4-8-8-4 4 3 3-1 1-2-2-9 9v3l-1 1"/></svg>
            Eyedropper
          </div>`;
        }

        // Custom color — mini gamut picker
        html += `<div class="pp-custom-row">
          <span class="pp-custom-label pp-expand-custom">&#9654; Custom color picker</span>
          <div class="pp-mini-picker">
            <div class="pp-mini-gamut-wrap">
              <canvas class="pp-mini-canvas"></canvas>
              <div class="pp-mini-dot"></div>
            </div>
            <input type="range" class="pp-mini-hue" min="0" max="360" step="1" value="295">
          </div>
        </div>`;

        dd.innerHTML = html;
        document.body.appendChild(dd);

        // Position fixed near the swatch
        const swatchRect = swatch.getBoundingClientRect();
        let top = swatchRect.bottom + 4;
        let left = swatchRect.left;
        // If would overflow bottom, open upward
        if (top + 400 > window.innerHeight) {
          top = Math.max(8, swatchRect.top - 400);
        }
        // Keep within viewport
        if (left + 230 > window.innerWidth) left = window.innerWidth - 240;
        dd.style.top = top + 'px';
        dd.style.left = Math.max(8, left) + 'px';

        // Eyedropper handler
        dd.querySelector('.pp-eyedropper')?.addEventListener('click', async (ev) => {
          ev.stopPropagation();
          try {
            const eyeDropper = new EyeDropper();
            const result = await eyeDropper.open();
            const hex = result.sRGBHex.toUpperCase();
            const alpha = TokenRegistry.theme[section]?.[tokenName]?.alpha ?? 1;
            TokenRegistry.setColor(section, tokenName, hex, alpha);
            swatch.style.background = ColorConverter.hexAlphaToRgba(hex, alpha);
            row.querySelector('.token-hex').value = hex;
            row.querySelector('.hidden-picker').value = hex;
            showUndo();
            dd.remove();
          } catch (e) { /* user cancelled */ }
        });

        // Swatch click → apply color
        dd.querySelectorAll('.pp-swatch').forEach(sw => {
          sw.addEventListener('click', (ev) => {
            ev.stopPropagation();
            const hex = sw.dataset.hex;
            const alpha = TokenRegistry.theme[section]?.[tokenName]?.alpha ?? 1;
            TokenRegistry.setColor(section, tokenName, hex, alpha);
            swatch.style.background = ColorConverter.hexAlphaToRgba(hex, alpha);
            row.querySelector('.token-hex').value = hex;
            row.querySelector('.hidden-picker').value = hex;
            dd.remove();
          });
        });

        // Mini gamut picker — expand/collapse + draw + interact
        dd.querySelector('.pp-expand-custom')?.addEventListener('click', (ev) => {
          ev.stopPropagation();
          const picker = dd.querySelector('.pp-mini-picker');
          picker.classList.toggle('visible');
          if (picker.classList.contains('visible')) {
            const miniCanvas = dd.querySelector('.pp-mini-canvas');
            const miniDot = dd.querySelector('.pp-mini-dot');
            const miniHue = dd.querySelector('.pp-mini-hue');
            let currentHue = parseFloat(miniHue.value);
            const currentOklch = OklchEngine.hexToOklch(row.querySelector('.token-hex')?.value || '#AA88FF');
            currentHue = currentOklch.H;
            miniHue.value = currentHue;
            // Clamp initial dot to gamut
            const initMaxC = GamutPicker.maxChromaAtL(currentOklch.L, currentHue);
            if (currentOklch.C > initMaxC) currentOklch.C = initMaxC;

            const drawMini = () => {
              GamutPicker.draw(miniCanvas, currentHue, currentOklch.L, currentOklch.C);
              GamutPicker.positionDot(miniDot, miniCanvas, currentOklch.L, currentOklch.C);
            };
            drawMini();

            // Mini hue slider
            miniHue.addEventListener('input', () => {
              currentHue = parseFloat(miniHue.value);
              const maxC = GamutPicker.maxChromaAtL(currentOklch.L, currentHue);
              if (currentOklch.C > maxC) currentOklch.C = maxC;
              currentOklch.H = currentHue;
              drawMini();
              const hex = OklchEngine.oklchToHex(currentOklch.L, currentOklch.C, currentHue);
              const alpha = TokenRegistry.theme[section]?.[tokenName]?.alpha ?? 1;
              TokenRegistry.setColor(section, tokenName, hex, alpha);
              swatch.style.background = ColorConverter.hexAlphaToRgba(hex, alpha);
              row.querySelector('.token-hex').value = hex;
              TokenHistory.push(section, tokenName, hex);
              showUndo();
            });

            // Mini canvas drag
            let dragging = false;
            miniCanvas.addEventListener('mousedown', (me) => { dragging = true; handleMiniDrag(me); me.preventDefault(); });
            document.addEventListener('mousemove', (me) => { if (dragging) handleMiniDrag(me); });
            document.addEventListener('mouseup', () => {
              if (dragging) {
                // Push final position to history on mouseup
                const hex = row.querySelector('.token-hex').value;
                TokenHistory.push(section, tokenName, hex);
                updateUndoRedoState();
              }
              dragging = false;
            });

            function handleMiniDrag(me) {
              const { L, C } = GamutPicker.getLCFromPosition(miniCanvas, me.clientX, me.clientY, currentHue);
              currentOklch.L = L;
              currentOklch.C = C;
              GamutPicker.positionDot(miniDot, miniCanvas, L, C);
              const hex = OklchEngine.oklchToHex(L, C, currentHue);
              const alpha = TokenRegistry.theme[section]?.[tokenName]?.alpha ?? 1;
              TokenRegistry.setColor(section, tokenName, hex, alpha);
              swatch.style.background = ColorConverter.hexAlphaToRgba(hex, alpha);
              row.querySelector('.token-hex').value = hex;
              row.querySelector('.hidden-picker').value = hex;
              showUndo();
            }
          }
        });

        // Undo/redo/reset
        const undoBtn = dd.querySelector('.pp-do-undo');
        const redoBtn = dd.querySelector('.pp-do-redo');
        const resetBtn = dd.querySelector('.pp-do-reset');

        const flashPreview = () => {
          // Flash components in preview that use this token
          document.querySelectorAll(`[data-tokens*="${tokenName}"]`).forEach(el => {
            el.classList.remove('token-changed-flash');
            void el.offsetWidth; // force reflow
            el.classList.add('token-changed-flash');
          });
        };

        const updateUndoRedoState = () => {
          if (undoBtn) undoBtn.classList.toggle('visible', TokenHistory.canUndo(section, tokenName));
          if (redoBtn) redoBtn.classList.toggle('visible', TokenHistory.canRedo(section, tokenName));
          if (resetBtn) resetBtn.classList.toggle('visible', TokenHistory.canUndo(section, tokenName));
        };

        const showUndo = () => { updateUndoRedoState(); flashPreview(); };

        const applyColor = (hex) => {
          const alpha = TokenRegistry.theme[section]?.[tokenName]?.alpha ?? 1;
          TokenRegistry.setColor(section, tokenName, hex, alpha);
          swatch.style.background = ColorConverter.hexAlphaToRgba(hex, alpha);
          row.querySelector('.token-hex').value = hex;
          row.querySelector('.hidden-picker').value = hex;
        };

        // Initialize undo/redo state from history
        updateUndoRedoState();

        undoBtn?.addEventListener('click', (ev) => {
          ev.stopPropagation();
          const hex = TokenHistory.undo(section, tokenName);
          if (hex) { applyColor(hex); updateUndoRedoState(); flashPreview(); }
        });

        redoBtn?.addEventListener('click', (ev) => {
          ev.stopPropagation();
          const hex = TokenHistory.redo(section, tokenName);
          if (hex) { applyColor(hex); updateUndoRedoState(); flashPreview(); }
        });

        resetBtn?.addEventListener('click', (ev) => {
          ev.stopPropagation();
          const hex = TokenHistory.reset(section, tokenName);
          if (hex) { applyColor(hex); updateUndoRedoState(); flashPreview(); }
        });

        // Track changes from swatch picks
        dd.querySelectorAll('.pp-swatch').forEach(sw => {
          sw.addEventListener('click', () => {
            TokenHistory.push(section, tokenName, sw.dataset.hex);
            showUndo();
          }, true);
        });

        // Close on click outside
        const closeHandler = (ev) => {
          if (!dd.contains(ev.target) && ev.target !== swatch) {
            dd.remove();
            document.removeEventListener('click', closeHandler);
          }
        };
        setTimeout(() => document.addEventListener('click', closeHandler), 10);
      });
    });

    // Native color picker change
    document.querySelectorAll('.hidden-picker').forEach(picker => {
      picker.addEventListener('input', (e) => {
        const section = e.target.dataset.section;
        const name = e.target.dataset.token;
        const hex = e.target.value.toUpperCase();
        const alpha = TokenRegistry.theme[section]?.[name]?.alpha ?? 1;
        TokenRegistry.setColor(section, name, hex, alpha);
        // Update row UI
        const row = e.target.closest('.token-row');
        row.querySelector('.token-swatch').style.background = ColorConverter.hexAlphaToRgba(hex, alpha);
        row.querySelector('.token-hex').value = hex;
      });
    });

    // Hex input change
    document.querySelectorAll('.token-hex').forEach(input => {
      input.addEventListener('change', (e) => {
        let hex = e.target.value.trim();
        if (!hex.startsWith('#')) hex = '#' + hex;
        if (!/^#[0-9A-Fa-f]{6}$/.test(hex)) return;
        hex = hex.toUpperCase();
        e.target.value = hex;
        const section = e.target.dataset.section;
        const name = e.target.dataset.token;
        const alpha = TokenRegistry.theme[section]?.[name]?.alpha ?? 1;
        TokenRegistry.setColor(section, name, hex, alpha);
        const row = e.target.closest('.token-row');
        row.querySelector('.token-swatch').style.background = ColorConverter.hexAlphaToRgba(hex, alpha);
        row.querySelector('.hidden-picker').value = hex;
      });
    });

    // Value slider/input
    document.querySelectorAll('.token-value-slider').forEach(slider => {
      slider.addEventListener('input', (e) => {
        const name = e.target.dataset.token;
        const val = parseFloat(e.target.value);
        TokenRegistry.setValue(name, val);
        e.target.closest('.token-row-value').querySelector('.token-value-input').value = val;
      });
    });
    document.querySelectorAll('.token-value-input').forEach(input => {
      input.addEventListener('change', (e) => {
        const name = e.target.dataset.token;
        const val = parseFloat(e.target.value);
        if (isNaN(val)) return;
        TokenRegistry.setValue(name, val);
        e.target.closest('.token-row-value').querySelector('.token-value-slider').value = val;
      });
    });
  },

  filterBySearch(query) {
    const q = query.toLowerCase();
    document.querySelectorAll('.token-row, .token-row-value').forEach(row => {
      const name = (row.dataset.token || '').toLowerCase();
      row.style.display = !q || name.includes(q) ? '' : 'none';
    });
    document.querySelectorAll('.token-group').forEach(group => {
      const visible = group.querySelectorAll('.token-row:not([style*="display: none"]), .token-row-value:not([style*="display: none"])');
      group.style.display = visible.length ? '' : 'none';
      if (q && visible.length) {
        group.classList.add('expanded');
        group.querySelector('.token-group-header')?.classList.add('expanded');
      }
    });
  }
};

      });

  drawWaveform() {
    const canvas = document.getElementById('waveform-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const w = canvas.offsetWidth;
    const h = canvas.offsetHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    ctx.scale(dpr, dpr);

    const style = getComputedStyle(document.getElementById('preview-area'));
    const lineColor = style.getPropertyValue('--vt-WaveformLine').trim() || '#AA88FF';
    const fillColor = style.getPropertyValue('--vt-WaveformFill').trim() || 'rgba(170,136,255,0.15)';
    const gridColor = style.getPropertyValue('--vt-WaveformGrid').trim() || 'rgba(76,79,82,0.6)';
    const playheadColor = style.getPropertyValue('--vt-WaveformPlayhead').trim() || 'rgba(255,255,255,0.8)';

    // Grid
    ctx.strokeStyle = gridColor;
    ctx.lineWidth = 0.5;
    for (let y = h * 0.25; y < h; y += h * 0.25) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }

    // Waveform
    const mid = h / 2;
    ctx.beginPath();
    ctx.moveTo(0, mid);
    for (let x = 0; x < w; x++) {
      const t = x / w;
      const y = mid + Math.sin(t * 12) * mid * 0.4 + Math.sin(t * 31) * mid * 0.15 + Math.sin(t * 67) * mid * 0.08;
      ctx.lineTo(x, y);
    }
    // Fill
    const fillPath = new Path2D();
    fillPath.moveTo(0, mid);
    for (let x = 0; x < w; x++) {
      const t = x / w;
      const y = mid + Math.sin(t * 12) * mid * 0.4 + Math.sin(t * 31) * mid * 0.15 + Math.sin(t * 67) * mid * 0.08;
      fillPath.lineTo(x, y);
    }
    fillPath.lineTo(w, mid);
    fillPath.closePath();
    ctx.fillStyle = fillColor;
    ctx.fill(fillPath);
    ctx.strokeStyle = lineColor;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Playhead
    const px = w * 0.6;
    ctx.strokeStyle = playheadColor;
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, h); ctx.stroke();
    ctx.setLineDash([]);
  },

  drawMeters() {
    ['meter-l', 'meter-r'].forEach((id, i) => {
      const canvas = document.getElementById(id);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const w = 12, h = 80;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      ctx.scale(dpr, dpr);

      const style = getComputedStyle(document.getElementById('preview-area'));
      const green = style.getPropertyValue('--vt-MeterGreen').trim() || '#4CAF50';
      const yellow = style.getPropertyValue('--vt-MeterYellow').trim() || '#FFC107';
      const red = style.getPropertyValue('--vt-MeterRed').trim() || '#F44336';

      const level = i === 0 ? 0.72 : 0.58;
      const grad = ctx.createLinearGradient(0, h, 0, 0);
      grad.addColorStop(0, green);
      grad.addColorStop(0.6, yellow);
      grad.addColorStop(0.85, red);

      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = grad;
      ctx.fillRect(0, h * (1 - level), w, h * level);
    });
  }
};

// ── Export Panel ──────────────────────────
const ExportPanel = {
  currentTab: 'json',

  show() {
    document.getElementById('export-overlay').classList.add('visible');
    this.generate();
  },
  hide() { document.getElementById('export-overlay').classList.remove('visible'); },

  generate() {
    const code = document.getElementById('export-code');
    switch (this.currentTab) {
      case 'json': code.textContent = TokenRegistry.toJSON(); break;
      case 'css': code.textContent = this.generateCSS(); break;
      case 'cpp': code.textContent = this.generateCppHeader(); break;
      case 'palette': code.textContent = this.generateCppPalette(); break;
      case 'oklch': code.textContent = this.generateOklchCSS(); break;
      case 'colorsystem': code.textContent = ColorSystemModel.toJSON(); break;
      case 'stylesystem': code.textContent = StyleSystem.toJSON(); break;
    }
  },

  generateCSS() {
    let lines = [':root {'];
    for (const section of ['colors', 'custom']) {
      for (const [name, t] of Object.entries(TokenRegistry.theme[section] || {})) {
        lines.push(`  --vt-${name}: ${ColorConverter.hexAlphaToRgba(t.value, t.alpha ?? 1)};`);
      }
    }
    for (const [name, t] of Object.entries(TokenRegistry.theme.juce || {})) {
      lines.push(`  --jt-${name.replace(/::/g, '-')}: ${ColorConverter.hexAlphaToRgba(t.value, t.alpha ?? 1)};`);
    }
    lines.push('}');
    return lines.join('\n');
  },

  generateCppHeader() {
    const meta = TokenRegistry.theme.meta;
    const ns = meta.name.toLowerCase().replace(/[^a-z0-9_]/g, '_');
    let lines = [
      '#pragma once',
      `// Generated by Visage Theme Designer`,
      `// Theme: ${meta.name}`,
      '', '#include "visage_graphics/theme.h"', '', `namespace ${ns} {`, ''
    ];
    for (const section of ['colors', 'custom']) {
      for (const [name, t] of Object.entries(TokenRegistry.theme[section] || {})) {
        if (typeof t.value !== 'string') continue;
        const argb = ColorConverter.hexAlphaToArgb(t.value, t.alpha ?? 1);
        lines.push(`VISAGE_THEME_COLOR(${name}, ${ColorConverter.argbToHex(argb)});`);
      }
    }
    lines.push('');
    for (const [name, t] of Object.entries(TokenRegistry.theme.values || {})) {
      lines.push(`VISAGE_THEME_VALUE(${name}, ${t.value}f);`);
    }
    lines.push('', `} // namespace ${ns}`, '');
    return lines.join('\n');
  },

  generateCppPalette() {
    const meta = TokenRegistry.theme.meta;
    const ns = meta.name.toLowerCase().replace(/[^a-z0-9_]/g, '_');
    let lines = [`// Palette init for: ${meta.name}`, `inline void initThemePalette(visage::Palette& palette) {`];
    for (const section of ['colors', 'custom']) {
      for (const [name, t] of Object.entries(TokenRegistry.theme[section] || {})) {
        if (typeof t.value !== 'string') continue;
        const argb = ColorConverter.hexAlphaToArgb(t.value, t.alpha ?? 1);
        lines.push(`  palette.setColor(${ns}::${name}, visage::Color(${ColorConverter.argbToHex(argb)}));`);
      }
    }
    lines.push('}', '');
    return lines.join('\n');
  },

  generateOklchCSS() {
    const cs = ColorSystemModel.current;
    if (!cs) return '/* No color system loaded */';
    let lines = ['/* Generated by Visage Theme Designer — OKLCH Color System */', '/* Platform-agnostic — works in CSS, Swift, Android */', '', ':root {'];
    // Palette shade variables
    for (const [palName, palette] of Object.entries(cs.palettes)) {
      lines.push(`  /* ${palName} */`);
      for (const step of ShadeGenerator.SHADE_STEPS) {
        const s = palette.shades[step];
        if (!s) continue;
        lines.push(`  --color-${palName}-${step}: oklch(${(s.L * 100).toFixed(1)}% ${s.C.toFixed(3)} ${s.H.toFixed(1)});`);
      }
      lines.push('');
    }
    // Semantic role variables
    const mode = document.getElementById('cs-mode')?.value || 'dark';
    const roles = cs.semanticRoles[mode];
    if (roles) {
      lines.push(`  /* Semantic roles (${mode} mode) */`);
      for (const [role, mapping] of Object.entries(roles)) {
        const palette = cs.palettes[mapping.palette];
        const shade = palette?.shades[mapping.shade];
        if (!shade) continue;
        const alpha = mapping.alpha != null && mapping.alpha < 1 ? ` / ${mapping.alpha}` : '';
        lines.push(`  --${role}: oklch(${(shade.L * 100).toFixed(1)}% ${shade.C.toFixed(3)} ${shade.H.toFixed(1)}${alpha});`);
      }
    }
    lines.push('}', '');
    return lines.join('\n');
  }
};

// ── Import / Export ──────────────────────
const ImportExport = {
  importJSON() {
    const input = document.getElementById('import-input');
    input.value = '';  // Allow re-selecting the same file
    input.click();
  },
  handleFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        TokenRegistry.load(data);
        document.getElementById('theme-name').value = data.meta?.name || 'Imported';
        LeftPanel.render();
        PreviewRenderer.render();
        Toast.show('Theme loaded: ' + (data.meta?.name || 'Imported'));
      } catch (err) {
        Toast.show('Invalid theme JSON: ' + err.message);
      }
    };
    reader.readAsText(file);
  },
  downloadJSON() {
    const json = TokenRegistry.toJSON();
    const name = TokenRegistry.theme.meta?.name || 'theme';
    const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `${slug}.json`; a.click();
    URL.revokeObjectURL(url);
  }
};

// ── Token Change History (persistent across dropdown open/close) ──
const TokenHistory = {
  // { 'section.tokenName': { original: '#HEX', changes: ['#HEX', ...], index: -1 } }
  history: {},

  key(section, name) { return `${section}.${name}`; },

  getOrCreate(section, name) {
    const k = this.key(section, name);
    if (!this.history[k]) {
      this.history[k] = {
        original: TokenRegistry.theme[section]?.[name]?.value || '#000000',
        changes: [],
        index: -1
      };
    }
    return this.history[k];
  },

  push(section, name, hex) {
    const h = this.getOrCreate(section, name);
    // Trim any redo history
    h.changes = h.changes.slice(0, h.index + 1);
    h.changes.push(hex);
    h.index = h.changes.length - 1;
    // Mark the token row as changed
    document.querySelectorAll(`.token-row[data-token="${name}"][data-section="${section}"]`).forEach(r => r.classList.add('has-change'));
  },

  canUndo(section, name) {
    const h = this.history[this.key(section, name)];
    return h && h.index >= 0;
  },

  canRedo(section, name) {
    const h = this.history[this.key(section, name)];
    return h && h.index < h.changes.length - 1;
  },

  undo(section, name) {
    const h = this.history[this.key(section, name)];
    if (!h || h.index < 0) return h?.original;
    h.index--;
    return h.index >= 0 ? h.changes[h.index] : h.original;
  },

  redo(section, name) {
    const h = this.history[this.key(section, name)];
    if (!h || h.index >= h.changes.length - 1) return null;
    h.index++;
    return h.changes[h.index];
  },

  reset(section, name) {
    const k = this.key(section, name);
    const h = this.history[k];
    if (h) {
      h.index = -1;
      document.querySelectorAll(`.token-row[data-token="${name}"][data-section="${section}"]`).forEach(r => r.classList.remove('has-change'));
    }
    return h?.original;
  },

  resetAll() {
    for (const [k, h] of Object.entries(this.history)) {
      const [section, name] = k.split('.');
      if (h.original) {
        const alpha = TokenRegistry.theme[section]?.[name]?.alpha ?? 1;
        TokenRegistry.setColor(section, name, h.original, alpha, true);
      }
    }
    this.history = {};
    document.querySelectorAll('.token-row.has-change').forEach(r => r.classList.remove('has-change'));
  }
};

// ── Undo Manager ─────────────────────────
const UndoManager = {
  stack: [],
  index: -1,
  maxDepth: 50,

  push(action) {
    this.stack = this.stack.slice(0, this.index + 1);
    this.stack.push(action);
    if (this.stack.length > this.maxDepth) { this.stack.shift(); }
    else { this.index++; }
    this.updateButtons();
  },

  reset() {
    this.stack = [];
    this.index = -1;
    this.updateButtons();
  },

  undo() {
    if (this.index < 0) return;
    const action = this.stack[this.index--];
    const token = TokenRegistry.theme[action.section]?.[action.name];
    if (token) {
      token.value = action.prevValue;
      if (action.prevAlpha !== undefined) token.alpha = action.prevAlpha;
      if (action.section !== 'values') CSSBridge.syncToken(action.section, action.name);
      CanvasRenderer.scheduleRedraw();
    }
    TokenRegistry.updateStatus();
    this.updateButtons();
  },

  redo() {
    if (this.index >= this.stack.length - 1) return;
    const action = this.stack[++this.index];
    const token = TokenRegistry.theme[action.section]?.[action.name];
    if (token) {
      token.value = action.newValue;
      if (action.newAlpha !== undefined) token.alpha = action.newAlpha;
      if (action.section !== 'values') CSSBridge.syncToken(action.section, action.name);
      CanvasRenderer.scheduleRedraw();
    }
    TokenRegistry.updateStatus();
    this.updateButtons();
  },

  updateButtons() {
    const u = document.getElementById('btn-undo');
    const r = document.getElementById('btn-redo');
    if (u) u.disabled = this.index < 0;
    if (r) r.disabled = this.index >= this.stack.length - 1;
  }
};

        dd.querySelectorAll('.pp-swatch').forEach(sw => {

            swatch.style.background = ColorConverter.hexAlphaToRgba(hex, alpha);

            dd.remove();
            LeftPanel.render();
            PreviewRenderer.render();

          ev.stopPropagation();

          if (picker.classList.contains('visible')) {
            const miniCanvas = dd.querySelector('.pp-mini-canvas');
            const miniDot = dd.querySelector('.pp-mini-dot');
            const miniHue = dd.querySelector('.pp-mini-hue');
            const currentOklch = OklchEngine.hexToOklch(tokenRow.querySelector('.token-hex')?.value || '#AA88FF');
            let currentHue = currentOklch.H;
            miniHue.value = currentHue;
            const maxC = GamutPicker.maxChromaAtL(currentOklch.L, currentHue);
            if (currentOklch.C > maxC) currentOklch.C = maxC;

            const drawMini = () => {
              GamutPicker.draw(miniCanvas, currentHue, currentOklch.L, currentOklch.C);
              GamutPicker.positionDot(miniDot, miniCanvas, currentOklch.L, currentOklch.C);
            };
            drawMini();

            miniHue.addEventListener('input', () => {
              currentHue = parseFloat(miniHue.value);
              const maxC2 = GamutPicker.maxChromaAtL(currentOklch.L, currentHue);
              if (currentOklch.C > maxC2) currentOklch.C = maxC2;
              currentOklch.H = currentHue;
              drawMini();
              const hex = OklchEngine.oklchToHex(currentOklch.L, currentOklch.C, currentHue);
              const alpha = TokenRegistry.theme[section]?.[tokenName]?.alpha ?? 1;
              TokenRegistry.setColor(section, tokenName, hex, alpha);
              swatch.style.background = ColorConverter.hexAlphaToRgba(hex, alpha);
              tokenRow.querySelector('.token-hex').value = hex;
            });

            let dragging = false;
            miniCanvas.addEventListener('mousedown', (me) => { dragging = true; handleDrag(me); me.preventDefault(); });
            document.addEventListener('mousemove', (me) => { if (dragging) handleDrag(me); });
            document.addEventListener('mouseup', () => { dragging = false; });
            function handleDrag(me) {
              const { L, C } = GamutPicker.getLCFromPosition(miniCanvas, me.clientX, me.clientY, currentHue);
              currentOklch.L = L; currentOklch.C = C;
              GamutPicker.positionDot(miniDot, miniCanvas, L, C);
              const hex = OklchEngine.oklchToHex(L, C, currentHue);
              const alpha = TokenRegistry.theme[section]?.[tokenName]?.alpha ?? 1;
              TokenRegistry.setColor(section, tokenName, hex, alpha);
              swatch.style.background = ColorConverter.hexAlphaToRgba(hex, alpha);
              tokenRow.querySelector('.token-hex').value = hex;
            }
          }
        });

        const closeHandler = (ev) => {
          if (!dd.contains(ev.target) && ev.target !== swatch) {
            dd.remove();
            document.removeEventListener('click', closeHandler);
          }
        };
        setTimeout(() => document.addEventListener('click', closeHandler), 10);
      });
    });
  }
};

// ── Gamut Triangle Picker ─────────────────
const GamutPicker = {
  // Precomputed gamut boundary for speed
  // Gamut boundary cache per hue
  _cachedBoundary: null,
  _cachedHue: -1,

  // Compute max chroma for each lightness value at a given hue
  _computeBoundary(hue, steps) {
    const boundary = [];
    for (let i = 0; i <= steps; i++) {
      const L = i / steps;
      let lo = 0, hi = 0.4;
      for (let j = 0; j < 16; j++) {
        const mid = (lo + hi) / 2;
        if (OklchEngine.isInGamut(L, mid, hue)) lo = mid;
        else hi = mid;
      }
      boundary.push(lo);
    }
    return boundary;
  },

  // Get max chroma at a given lightness for current hue
  maxChromaAtL(L, hue) {
    let lo = 0, hi = 0.4;
    for (let i = 0; i < 16; i++) {
      const mid = (lo + hi) / 2;
      if (OklchEngine.isInGamut(L, mid, hue)) lo = mid;
      else hi = mid;
    }
    return lo;
  },

  // Draw the OKLCH gamut picker
  // Mapping from supacolors shader: X=Lightness(0-1), Y=Chroma(0-0.4)
  // Screen: X left=black right=white, Y bottom=gray top=saturated
  draw(canvas, hue, currentL, currentC) {
    const ctx = canvas.getContext('2d');
    // Use physical pixel dimensions for ImageData (fixes DPR mismatch on Retina)
    const cssW = canvas.offsetWidth;
    const cssH = canvas.offsetHeight;
    const dpr = window.devicePixelRatio || 1;
    const w = Math.round(cssW * dpr);
    const h = Math.round(cssH * dpr);
    canvas.width = w;
    canvas.height = h;
    // NO ctx.scale — we work in physical pixels for ImageData

    const maxC = 0.4;

    // Compute boundary at physical pixel resolution
    const boundary = this._computeBoundary(hue, w);

    // Render gamut pixels at full physical resolution
    const imgData = ctx.createImageData(w, h);
    const data = imgData.data;
    for (let py = 0; py < h; py++) {
      const C = (1 - py / h) * maxC;
      for (let px = 0; px < w; px++) {
        const L = px / w;
        const i = (py * w + px) * 4;
        if (OklchEngine.isInGamut(L, C, hue)) {
          const rgb = OklchEngine.oklchToSrgb(L, C, hue);
          data[i] = rgb.r; data[i+1] = rgb.g; data[i+2] = rgb.b; data[i+3] = 255;
        } else {
          data[i] = 30; data[i+1] = 30; data[i+2] = 34; data[i+3] = 255;
        }
      }
    }
    ctx.putImageData(imgData, 0, 0);

    // Gamut boundary line (in physical pixel coords)
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = dpr;
    ctx.moveTo(0, h);
    for (let px = 0; px <= w; px++) {
      const maxCAtL = boundary[Math.min(px, boundary.length - 1)];
      const py = (1 - maxCAtL / maxC) * h;
      ctx.lineTo(px, py);
    }
    ctx.lineTo(w, h);
    ctx.closePath();
    ctx.stroke();

    // Crosshair lines (in physical pixel coords)
    const dotX = currentL * w;
    const dotY = (1 - currentC / maxC) * h;
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = dpr * 0.5;
    ctx.beginPath();
    ctx.moveTo(dotX, 0); ctx.lineTo(dotX, h);
    ctx.moveTo(0, dotY); ctx.lineTo(w, dotY);
    ctx.stroke();
  },

  // Position the dot — matches supacolors shader mapping:
  // X = lightness (left=0/black, right=1/white)
  // Y = chroma inverted (top=maxC, bottom=0)
  positionDot(dotEl, canvas, L, C) {
    const w = canvas.offsetWidth;
    const h = canvas.offsetHeight;
    const maxC = 0.4;
    const px = L * w;                   // X = lightness
    const py = (1 - C / maxC) * h;     // Y = chroma (screen-inverted)
    dotEl.style.left = `${Math.max(0, Math.min(w, px))}px`;
    dotEl.style.top = `${Math.max(0, Math.min(h, py))}px`;
  },

  // Get L and C from mouse position, CLAMPED to gamut boundary
  getLCFromPosition(canvas, clientX, clientY, hue) {
    const rect = canvas.getBoundingClientRect();
    const x = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    const y = Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));
    const maxC = 0.4;
    const L = x;
    let C = (1 - y) * maxC;
    // Clamp C to max gamut at this lightness — dot can't go outside triangle
    const maxCAtL = this.maxChromaAtL(L, hue);
    C = Math.min(C, maxCAtL);
    C = Math.max(C, 0);
    return { L, C };
  },

  // Initialize drag handling for a gamut canvas
  initDrag(canvasWrap, paletteKey, onUpdate) {
    const canvas = canvasWrap.querySelector('.cs-gamut-canvas');
    const dot = canvasWrap.querySelector('.cs-gamut-dot');
    if (!canvas || !dot) return;

    let dragging = false;

    const handleMove = (e) => {
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const palette = ColorSystemModel.current.palettes[paletteKey];
      if (!palette) return;
      // Get L and C, clamped to gamut boundary (dot stays inside triangle)
      const { L, C } = this.getLCFromPosition(canvas, clientX, clientY, palette.baseColor.H);

      palette.baseColor.L = L;
      palette.baseColor.C = C;
      ColorSystemModel.updatePaletteBase(paletteKey, L, C, palette.baseColor.H);

      this.positionDot(dot, canvas, L, C);
      dot.style.background = OklchEngine.oklchToHex(L, C, palette.baseColor.H);

      if (onUpdate) onUpdate(paletteKey);
    };

    canvas.addEventListener('mousedown', (e) => {
      dragging = true;
      handleMove(e);
      e.preventDefault();
    });
    canvas.addEventListener('touchstart', (e) => {
      dragging = true;
      handleMove(e);
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('mousemove', (e) => { if (dragging) handleMove(e); });
    document.addEventListener('touchmove', (e) => { if (dragging) handleMove(e); }, { passive: false });
    document.addEventListener('mouseup', () => { dragging = false; });
    document.addEventListener('touchend', () => { dragging = false; });
  }
};

  bindEvents() {
    // Initialize gamut triangle pickers for expanded palettes
    document.querySelectorAll('.cs-gamut-wrap').forEach(wrap => {

      GamutPicker.draw(canvas, palette.baseColor.H, palette.baseColor.L, palette.baseColor.C);
      GamutPicker.positionDot(dot, canvas, palette.baseColor.L, palette.baseColor.C);
      dot.style.background = OklchEngine.oklchToHex(palette.baseColor.L, palette.baseColor.C, palette.baseColor.H);

      // Set up drag interaction
      GamutPicker.initDrag(wrap, key, (changedKey) => {
        this.applyHarmony(changedKey);
        // Live apply without full re-render (just CSS vars + canvas redraws)
        const mode = document.getElementById('cs-mode')?.value || 'dark';
        ColorSystemModel.applyLive(mode);
        // Update the L/C/H numeric inputs
        const p = ColorSystemModel.current.palettes[changedKey];
        wrap.closest('.cs-palette-editor')?.querySelectorAll('.cs-oklch-input input').forEach(inp => {
          if (inp.dataset.param === 'L') inp.value = (p.baseColor.L * 100).toFixed(1);
          if (inp.dataset.param === 'C-input') inp.value = p.baseColor.C.toFixed(3);
        });
        // Redraw shade ramp swatches
        wrap.closest('.cs-palette-editor')?.querySelectorAll('.cs-shade-large').forEach((el, i) => {
          const step = ShadeGenerator.SHADE_STEPS[i];
          const shade = p.shades[step];
          if (shade) el.style.background = shade.hex;
        });
        // Redraw mini ramp in palette row
        const row = wrap.previousElementSibling;
        if (row) {
          row.querySelectorAll('.cs-mini-swatch').forEach((sw, i) => {
            const step = ShadeGenerator.SHADE_STEPS[i];
            const shade = p.shades[step];
            if (shade) sw.style.background = shade.hex;
          });
          const dotEl = row.querySelector('.cs-palette-dot');
          if (dotEl && p.shades[500]) dotEl.style.background = p.shades[500].hex;
        }
      });
    });

    // Palette row click to expand — and make it the accent if it's chromatic
    document.querySelectorAll('.cs-palette-row').forEach(row => {
      row.addEventListener('click', () => {
        const key = row.dataset.palette;
        this.expandedPalette = this.expandedPalette === key ? null : key;

        // If expanding a chromatic palette (not neutral/success/warning/error),
        // reassign semantic accent roles to this palette
        const neutralKeys = ['neutral', 'slate', 'gray', 'zinc', 'stone'];
        const semanticKeys = ['success', 'warning', 'error'];
        if (this.expandedPalette && !neutralKeys.includes(key) && !semanticKeys.includes(key)) {
          this.setAccentPalette(key);
        }

        this.render();
      });
    });

    // Shade swatch click to override
    document.querySelectorAll('.cs-shade-large').forEach(swatch => {
      swatch.addEventListener('click', (e) => {
        e.stopPropagation();
        const key = swatch.closest('.cs-palette-editor')?.previousElementSibling?.dataset?.palette;
        if (!key) return;
        const step = parseInt(swatch.title?.match(/^(\d+)/)?.[1]);
        if (isNaN(step)) return;
        // Create a hidden color input and trigger it
        const input = document.createElement('input');
        input.type = 'color';
        input.value = swatch.style.background ? OklchEngine.oklchToHex(
          ColorSystemModel.current.palettes[key]?.shades[step]?.L || 0.5,
          ColorSystemModel.current.palettes[key]?.shades[step]?.C || 0.1,
          ColorSystemModel.current.palettes[key]?.shades[step]?.H || 0
        ) : '#888888';
        input.style.position = 'absolute'; input.style.opacity = '0';
        document.body.appendChild(input);
        input.addEventListener('input', () => {
          const oklch = OklchEngine.hexToOklch(input.value);
          const palette = ColorSystemModel.current.palettes[key];
          if (palette?.shades[step]) {
            palette.shades[step] = { ...oklch, hex: input.value.toUpperCase(), overridden: true };
            swatch.style.background = input.value;
            swatch.style.boxShadow = 'inset 0 0 0 2px rgba(255,200,0,0.6)'; // Gold border for overrides
            const mode = document.getElementById('cs-mode')?.value || 'dark';
            ColorSystemModel.applyLive(mode);
          }
        });
        input.addEventListener('change', () => { document.body.removeChild(input); });
        input.click();
      });
    });

    // Hue and chroma sliders
    document.querySelectorAll('.cs-slider').forEach(slider => {
      slider.addEventListener('input', (e) => {
        const key = e.target.dataset.palette;
        const param = e.target.dataset.param;
        const palette = ColorSystemModel.current.palettes[key];
        if (!palette) return;
        if (param === 'H') {
          palette.baseColor.H = parseFloat(e.target.value);
          // Clamp C to new gamut at current L (dot stays inside triangle)
          const maxCAtL = GamutPicker.maxChromaAtL(palette.baseColor.L, palette.baseColor.H);
          if (palette.baseColor.C > maxCAtL) palette.baseColor.C = maxCAtL;
          // Redraw gamut triangle for new hue
          const canvas = document.getElementById(`gamut-${key}`);
          const dot = document.getElementById(`gamut-dot-${key}`);
          if (canvas && dot) {
            GamutPicker.draw(canvas, palette.baseColor.H, palette.baseColor.L, palette.baseColor.C);
            GamutPicker.positionDot(dot, canvas, palette.baseColor.L, palette.baseColor.C);
            dot.style.background = OklchEngine.oklchToHex(palette.baseColor.L, palette.baseColor.C, palette.baseColor.H);
          }
          // Update chroma slider gradient and value for new hue
          const chromaSlider = e.target.closest('.cs-palette-editor')?.querySelector('[data-param="C"]');
          if (chromaSlider) {
            chromaSlider.value = palette.baseColor.C; // reflect clamped value
            const grayHex = OklchEngine.oklchToHex(palette.baseColor.L, 0, palette.baseColor.H);
            const satHex = OklchEngine.oklchToHex(palette.baseColor.L, 0.25, palette.baseColor.H);
            chromaSlider.style.background = `linear-gradient(to right, ${grayHex}, ${satHex})`;
          }
        }
        if (param === 'C') {
          palette.baseColor.C = parseFloat(e.target.value);
          // Clamp C to gamut
          const maxCSlider = GamutPicker.maxChromaAtL(palette.baseColor.L, palette.baseColor.H);
          if (palette.baseColor.C > maxCSlider) palette.baseColor.C = maxCSlider;
          // Update gamut dot position
          const canvas = document.getElementById(`gamut-${key}`);
          const dot = document.getElementById(`gamut-dot-${key}`);
          if (canvas && dot) {
            GamutPicker.positionDot(dot, canvas, palette.baseColor.L, palette.baseColor.C);
            dot.style.background = OklchEngine.oklchToHex(palette.baseColor.L, palette.baseColor.C, palette.baseColor.H);
          }
        }
        const { L, C, H } = palette.baseColor;
        ColorSystemModel.updatePaletteBase(key, L, C, H);
        this.applyHarmony(key);
        // Live update without full re-render
        const mode = document.getElementById('cs-mode')?.value || 'dark';
        ColorSystemModel.applyLive(mode);
        // Update shade ramp swatches inline
        const editor = e.target.closest('.cs-palette-editor');
        if (editor) {
          editor.querySelectorAll('.cs-shade-large').forEach((el, i) => {
            const step = ShadeGenerator.SHADE_STEPS[i];
            const shade = palette.shades[step];
            if (shade) el.style.background = shade.hex;
          });
        }
      });
    });

    // OKLCH numeric inputs
    document.querySelectorAll('.cs-oklch-input input').forEach(input => {
      input.addEventListener('change', (e) => {
        const key = e.target.dataset.palette;
        const param = e.target.dataset.param;
        const palette = ColorSystemModel.current.palettes[key];
        if (!palette) return;
        const val = parseFloat(e.target.value);
        if (isNaN(val)) return;
        if (param === 'L') palette.baseColor.L = val / 100;
        if (param === 'C-input') palette.baseColor.C = val;
        if (param === 'H-input') palette.baseColor.H = val;
        const { L, C, H } = palette.baseColor;
        ColorSystemModel.updatePaletteBase(key, L, C, H);
        this.applyHarmony(key);
        this.render();
      });
    });
  },

  // Reassign all accent-pointing semantic roles to a new palette
  setAccentPalette(newAccentKey) {
    const cs = ColorSystemModel.current;
    const oldAccentKey = this.getAccentKey();
    if (newAccentKey === oldAccentKey) return;

    for (const mode of ['dark', 'light']) {
      const roles = cs.semanticRoles[mode];
      if (!roles) continue;
      for (const [role, mapping] of Object.entries(roles)) {
        if (mapping.palette === oldAccentKey) {
          mapping.palette = newAccentKey;
        }
      }
    }
    // Also run harmony to update neutral
    this.applyHarmony(newAccentKey);
  },

  // When accent changes, auto-derive neutral using harmony mode
  applyHarmony(changedPalette) {
    const cs = ColorSystemModel.current;
    const harmonyMode = document.getElementById('cs-harmony')?.value || 'monochromatic';
    if (harmonyMode === 'none') return; // Manual mode — don't auto-derive

    // Only trigger when accent (or first non-neutral/success/warning/error palette) changes
    const accentKey = this.getAccentKey();
    if (changedPalette !== accentKey) return;

    const accent = cs.palettes[accentKey];
    if (!accent) return;

    const neutralKey = this.getNeutralKey();
    const neutralPalette = cs.palettes[neutralKey];
    if (!neutralPalette) return;

    // Derive new neutral base from accent hue + harmony mode
    const derived = OklchEngine.deriveNeutral(
      accent.baseColor.L, accent.baseColor.C, accent.baseColor.H, harmonyMode
    );
    ColorSystemModel.updatePaletteBase(neutralKey, derived.L, derived.C, derived.H);

    // Nudge semantic colors toward accent hue — visible but still recognizable
    const nudge = 0.18;
    const semanticPalettes = { success: 142, warning: 75, error: 25 }; // base hues
    for (const [name, baseHue] of Object.entries(semanticPalettes)) {
      const pal = cs.palettes[name];
      if (!pal) continue;
      const newH = ColorSystemModel._harmonizeSemanticHue(baseHue, accent.baseColor.H, nudge);
      ColorSystemModel.updatePaletteBase(name, pal.baseColor.L, pal.baseColor.C, newH);
    }

    cs.meta.harmony = harmonyMode;
  },

  // Find the accent palette key by checking what AccentPrimary points to
  getAccentKey() {
    const cs = ColorSystemModel.current;
    // Check what the AccentPrimary semantic role points to
    const accentRole = cs.semanticRoles?.dark?.AccentPrimary;
    if (accentRole?.palette && cs.palettes[accentRole.palette]) {
      return accentRole.palette;
    }
    // Fallback: first chromatic palette
    for (const key of Object.keys(cs.palettes)) {
      if (!['neutral', 'slate', 'gray', 'zinc', 'stone', 'success', 'warning', 'error'].includes(key)) {
        return key;
      }
    }
    return Object.keys(cs.palettes)[0];
  },

  // Find the neutral palette key
  getNeutralKey() {
    const cs = ColorSystemModel.current;
    for (const key of ['neutral', 'slate', 'gray', 'zinc', 'stone']) {
      if (cs.palettes[key]) return key;
    }
    return Object.keys(cs.palettes)[1] || Object.keys(cs.palettes)[0];
  },

  init() {
    // Initialize color system
    ColorSystemModel.init();

    // Header toggle
    const header = document.getElementById('cs-header');
    header.addEventListener('click', () => {
      header.classList.toggle('expanded');
      document.getElementById('color-system').classList.toggle('expanded');
    });

    // Harmony selector — re-derive neutral from accent
    document.getElementById('cs-harmony').addEventListener('change', (e) => {
      const accentKey = this.getAccentKey();
      this.applyHarmony(accentKey);
      this.render();
      Toast.show('Harmony: ' + e.target.value);
    });

    // Mode change — auto-apply immediately
    document.getElementById('cs-mode').addEventListener('change', () => {
      this.render();
    });

    // Generate inverse mode (dark→light or light→dark)
    document.getElementById('cs-generate-inverse').addEventListener('click', () => {
      const currentMode = document.getElementById('cs-mode').value;
      const targetMode = currentMode === 'dark' ? 'light' : 'dark';
      const cs = ColorSystemModel.current;
      const source = cs.semanticRoles[currentMode];
      if (!source) return;

      // Shade inversion map: dark shade → light shade
      const invertShade = (shade) => {
        const map = { 50: 950, 100: 900, 200: 800, 300: 700, 400: 600, 500: 500, 600: 400, 700: 300, 800: 200, 900: 100, 950: 50 };
        return map[shade] ?? shade;
      };

      // Accent shades shift slightly: 500→600 in light (darker for readability)
      const invertAccentShade = (shade) => {
        const map = { 300: 700, 400: 600, 500: 600, 600: 500, 700: 400 };
        return map[shade] ?? invertShade(shade);
      };

      // Generate the target mode roles by inverting the source
      const generated = {};
      const neutralKeys = [this.getNeutralKey()];
      const accentKey = this.getAccentKey();

      for (const [role, mapping] of Object.entries(source)) {
        const isNeutral = neutralKeys.includes(mapping.palette);
        const isAccent = mapping.palette === accentKey;
        const isSemantic = ['success', 'warning', 'error', 'green', 'amber', 'red'].includes(mapping.palette);

        let newShade;
        if (isNeutral) {
          newShade = invertShade(mapping.shade);
        } else if (isAccent) {
          newShade = invertAccentShade(mapping.shade);
        } else if (isSemantic) {
          // Semantic colors shift slightly darker in light mode for readability
          newShade = mapping.shade <= 500 ? Math.min(mapping.shade + 100, 700) : mapping.shade;
        } else {
          newShade = invertShade(mapping.shade);
        }

        generated[role] = {
          ...mapping,
          shade: newShade
        };
      }

      cs.semanticRoles[targetMode] = generated;

      // Switch to the generated mode
      document.getElementById('cs-mode').value = targetMode;
      this.render();
      Toast.show('Generated ' + targetMode + ' mode from ' + currentMode);
    });

    // Template selector
    document.getElementById('cs-template').addEventListener('change', (e) => {
      ColorSystemModel.current = ColorSystemModel.createFromTemplate(e.target.value);
      this.expandedPalette = null;
      this.render();
      Toast.show('Template loaded: ' + ColorSystemModel.current.meta.name);
    });

    // Apply button (removed from UI but kept as safety fallback)
    document.getElementById('cs-apply')?.addEventListener('click', () => {
      const mode = document.getElementById('cs-mode').value;
      ColorSystemModel.applyToTheme(mode);
    });

    // Save button
    document.getElementById('cs-save').addEventListener('click', () => {
      const json = ColorSystemModel.toJSON();
      const name = ColorSystemModel.current.meta.name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `${name}.colorsystem.json`; a.click();
      URL.revokeObjectURL(url);
      Toast.show('Color system saved');
    });

    // Load button
    document.getElementById('cs-load').addEventListener('click', () => {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = '.json';
      input.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          if (ColorSystemModel.fromJSON(ev.target.result)) {
            this.render();
            Toast.show('Color system loaded: ' + ColorSystemModel.current.meta.name);
          } else {
            Toast.show('Invalid color system file');
          }
        };
        reader.readAsText(file);
      });
      input.click();
    });

    // Render initial state
    this.render();
  }
};
